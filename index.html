<!DOCTYPE html>
<html>
<head>
    <title>PepTalk - Global Project Map</title>
    <meta charset="utf-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #0a0b0f; }
        #map { height: calc(100vh - 64px); width: 100%; }

        .leaflet-container { background: #fff; }

        /* Header bar */
        .header {
            height: 64px;
            background: linear-gradient(135deg, #0f1117 0%, #161822 100%);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo-text {
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 22px; height: 22px; }
        .header-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
            padding-left: 16px;
            border-left: 1px solid rgba(255,255,255,0.12);
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .stat-pill {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
        }
        .stat-pill strong { color: #22c55e; font-weight: 600; }

        /* Map popups */
        .leaflet-popup-content-wrapper {
            background: #fff !important;
            border: 1px solid #e5e7eb !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
        }
        .leaflet-popup-tip { background: #fff !important; }
        .leaflet-popup-close-button { color: #999 !important; font-size: 18px !important; }
        .leaflet-popup-close-button:hover { color: #333 !important; }

        .city-label { padding: 4px 0; font-size: 13px; line-height: 1.5; max-width: 280px; }
        .city-label h3 { margin: 0 0 2px 0; color: #16a34a; font-size: 15px; font-family: 'Lexend', sans-serif; font-weight: 600; }
        .city-label .country { color: #999; font-size: 12px; margin-bottom: 8px; }
        .city-label .projects { font-size: 12px; color: #555; }
        .city-label .projects div { padding: 2px 0; }
        .city-label .projects strong { color: #333; }
        .city-label .inactive { color: #bbb; font-style: italic; }

        /* Legend */
        .legend {
            background: #fff !important;
            border: 1px solid #e5e7eb;
            padding: 14px 18px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            font-size: 13px;
            line-height: 1.8;
            color: #666;
        }
        .legend h4 { margin: 0 0 8px 0; color: #1a1b23; font-family: 'Lexend', sans-serif; font-weight: 600; }
        .legend .dot {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; margin-right: 8px; vertical-align: middle;
        }
        .legend .us { background: #3b82f6; }
        .legend .eu { background: #16a34a; }
        .legend .uk { background: #ef4444; }
        .legend .ie { background: #8b5cf6; }
        .legend .ca { background: #f97316; }

        /* Toggle */
        .toggle-bar {
            background: #fff !important;
            border: 1px solid #e5e7eb;
            padding: 10px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            font-size: 13px;
            cursor: pointer;
            color: #555;
        }
        .toggle-bar label { cursor: pointer; }
        .toggle-bar input { accent-color: #22c55e; margin-right: 6px; }

        /* Leaflet controls */
        .leaflet-control-zoom a {
            background: #fff !important;
            color: #555 !important;
            border-color: #e5e7eb !important;
        }
        .leaflet-control-zoom a:hover { background: #f5f5f5 !important; color: #111 !important; }
        .leaflet-control-attribution { background: rgba(255,255,255,0.8) !important; color: #bbb !important; }
        .leaflet-control-attribution a { color: #999 !important; }
    </style>

const activeCountries = new Set(projects.filter(p => p.status === 'Active').map(p => p.country)).size;
const activeCities = new Set(projects.filter(p => p.status === 'Active').map(p => p.city)).size;

    '<span class="stat-pill"><strong>' + activeCities + '</strong> cities</span>' +
    '<span class="stat-pill"><strong>' + activeCountries + '</strong> countries</span>';

// Group by location
function groupByLocation(items) {
    const groups = {};
    items.forEach(p => {
        const key = p.lat.toFixed(1) + ',' + p.lng.toFixed(1);
        if (!groups[key]) groups[key] = { lat: p.lat, lng: p.lng, city: p.city, country: p.country, region: p.region, active: [], inactive: [] };
        if (p.status === 'Active') groups[key].active.push(p.name);
        else groups[key].inactive.push(p.name);
    });
    return Object.values(groups);
}

let activeLayer = L.layerGroup();
let allLayer = L.layerGroup();

function buildMarkers(showInactive) {
    const layer = showInactive ? allLayer : activeLayer;
    layer.clearLayers();
    const filtered = showInactive ? projects : projects.filter(p => p.status === 'Active');
    const groups = groupByLocation(filtered);

    groups.forEach(g => {
        const total = g.active.length + g.inactive.length;
        const color = regionColors[g.region] || '#888';
        const radius = Math.min(6 + total * 1.2, 16);

        // Glowing marker effect
        const glow = L.circleMarker([g.lat, g.lng], {
            radius: radius + 6,
            fillColor: color,
            color: 'transparent',
            fillOpacity: 0.15
        }).addTo(layer);

        const marker = L.circleMarker([g.lat, g.lng], {
            radius: radius,
            fillColor: color,
            color: 'rgba(255,255,255,0.3)',
            weight: 1.5,
            opacity: 1,
            fillOpacity: 0.9
        }).addTo(layer);

        let html = '<div class="city-label"><h3>' + g.city + '</h3><div class="country">' + g.country + '</div><div class="projects">';
        if (g.active.length > 0) {
            html += '<strong>' + g.active.length + ' active project' + (g.active.length > 1 ? 's' : '') + ':</strong>';
            g.active.forEach(n => html += '<div>- ' + n + '</div>');
        }
        if (g.inactive.length > 0) {
            html += '<div class="inactive" style="margin-top:6px"><strong>' + g.inactive.length + ' inactive:</strong>';
            g.inactive.forEach(n => html += '<div>- ' + n + '</div>');
            html += '</div>';
        }
        html += '</div></div>';
        marker.bindPopup(html, { maxWidth: 320 });
    });
}

activeLayer.addTo(map);
buildMarkers(true);

toggle.onAdd = function() {
    const div = L.DomUtil.create('div', 'toggle-bar');
    div.innerHTML = '<label><input type="checkbox" id="showInactive"> Show inactive projects</label>';
    L.DomEvent.disableClickPropagation(div);
    div.querySelector('input').addEventListener('change', function() {
        if (this.checked) { map.removeLayer(activeLayer); allLayer.addTo(map); }
        else { map.removeLayer(allLayer); activeLayer.addTo(map); }
    });
    return div;
};
toggle.addTo(map);

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<h4>Regions</h4>' +
        '<div><span class="dot us"></span>United States</div>' +
        '<div><span class="dot ie"></span>Ireland</div>' +
        '<div><span class="dot uk"></span>United Kingdom</div>' +
        '<div><span class="dot eu"></span>Europe</div>' +
        '<div><span class="dot ca"></span>Canada</div>' +
        '<div style="margin-top:10px;font-size:11px;color:rgba(255,255,255,0.35);">Click pins for details</div>';
    return div;
};
legend.addTo(map);
</script>
