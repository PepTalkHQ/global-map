        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .city-label {
            background: rgba(255,255,255,0.95);
            border: 1px solid #4a86e8;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 300px;
        }
        .city-label h3 { margin: 0 0 4px 0; color: #4a86e8; font-size: 14px; }
        .city-label .country { color: #666; font-size: 12px; margin-bottom: 6px; }
        .city-label .projects { font-size: 12px; color: #333; }
        .city-label .projects div { padding: 1px 0; }
        .city-label .inactive { color: #999; font-style: italic; }
        .legend {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 13px;
            line-height: 1.8;
        }
        .legend h4 { margin: 0 0 6px 0; }
        .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .legend .us { background: #4a86e8; }
        .legend .eu { background: #38a169; }
        .legend .uk { background: #e53e3e; }
        .legend .ie { background: #805ad5; }
        .legend .ca { background: #dd6b20; }
        .toggle-bar {
            background: white; padding: 8px 14px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 13px; cursor: pointer;
        }
        .toggle-bar label { cursor: pointer; }
    </style>

// Group by city (round to 1 decimal to cluster nearby)
function groupByLocation(items) {
    const groups = {};
    items.forEach(p => {
        const key = p.lat.toFixed(1) + ',' + p.lng.toFixed(1);
        if (!groups[key]) groups[key] = { lat: p.lat, lng: p.lng, city: p.city, country: p.country, region: p.region, active: [], inactive: [] };
        if (p.status === 'Active') groups[key].active.push(p.name);
        else groups[key].inactive.push(p.name);
    });
    return Object.values(groups);
}

let activeLayer = L.layerGroup();
let allLayer = L.layerGroup();

function buildMarkers(showInactive) {
    const layer = showInactive ? allLayer : activeLayer;
    layer.clearLayers();
    const filtered = showInactive ? projects : projects.filter(p => p.status === 'Active');
    const groups = groupByLocation(filtered);

    groups.forEach(g => {
        const total = g.active.length + g.inactive.length;
        const color = regionColors[g.region] || '#333';
        const radius = Math.min(6 + total * 1.2, 16);

        const marker = L.circleMarker([g.lat, g.lng], {
            radius: radius,
            fillColor: color,
            color: '#fff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.85
        }).addTo(layer);

        let html = '<div class="city-label"><h3>' + g.city + '</h3><div class="country">' + g.country + '</div><div class="projects">';
        if (g.active.length > 0) {
            html += '<strong>' + g.active.length + ' active:</strong>';
            g.active.forEach(n => html += '<div>- ' + n + '</div>');
        }
        if (g.inactive.length > 0) {
            html += '<div class="inactive" style="margin-top:4px"><strong>' + g.inactive.length + ' inactive:</strong>';
            g.inactive.forEach(n => html += '<div>- ' + n + '</div>');
            html += '</div>';
        }
        html += '</div></div>';
        marker.bindPopup(html, { maxWidth: 320 });
    });
}

buildMarkers(false);
activeLayer.addTo(map);
buildMarkers(true);

// Toggle control
const toggle = L.control({ position: 'topright' });
toggle.onAdd = function() {
    const div = L.DomUtil.create('div', 'toggle-bar');
    div.innerHTML = '<label><input type="checkbox" id="showInactive" onchange="toggleInactive(this.checked)"> Show inactive projects</label>';
    div.onclick = function(e) { e.stopPropagation(); };
    return div;
};
toggle.addTo(map);

window.toggleInactive = function(show) {
    if (show) { map.removeLayer(activeLayer); allLayer.addTo(map); }
    else { map.removeLayer(allLayer); activeLayer.addTo(map); }
};

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    const activeCount = projects.filter(p => p.status === 'Active').length;
    const inactiveCount = projects.filter(p => p.status === 'Inactive').length;
    div.innerHTML = '<h4>PepTalk Projects</h4>' +
        '<div><span class="dot us"></span>United States (' + projects.filter(p=>p.region==='US'&&p.status==='Active').length + ')</div>' +
        '<div><span class="dot ie"></span>Ireland (' + projects.filter(p=>p.region==='IE'&&p.status==='Active').length + ')</div>' +
        '<div><span class="dot uk"></span>United Kingdom (' + projects.filter(p=>p.region==='UK'&&p.status==='Active').length + ')</div>' +
        '<div><span class="dot eu"></span>Europe (' + projects.filter(p=>p.region==='EU'&&p.status==='Active').length + ')</div>' +
        '<div><span class="dot ca"></span>Canada (1)</div>' +
        '<div style="margin-top:8px;font-size:12px;color:#666;">' + activeCount + ' active / ' + inactiveCount + ' inactive</div>' +
        '<div style="font-size:11px;color:#888;">Click pins for details</div>';
    return div;
};
legend.addTo(map);

// Title
const title = L.control({ position: 'topleft' });
title.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    const cities = new Set(projects.filter(p=>p.status==='Active').map(p=>p.city));
    const countries = new Set(projects.filter(p=>p.status==='Active').map(p=>p.country));
    div.innerHTML = '<h4 style="margin:0;font-size:16px;">PepTalk Global Footprint</h4>' +
        '<div style="font-size:12px;color:#666;">' + projects.filter(p=>p.status==='Active').length + ' active projects across ' + cities.size + ' cities in ' + countries.size + ' countries</div>';
    return div;
};
title.addTo(map);
